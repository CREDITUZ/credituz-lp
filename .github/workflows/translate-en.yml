name: Traduzir LP para o ingles

# Dispara quando paginas de marketing em PT mudam no main, e tambem manualmente.
# Nao dispara ao alterar en/**, entao o commit do proprio Action nao gera loop.
on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "white-label.html"
      - "pages/incorporadoras.html"
      - "pages/imobiliarias.html"
      - "pages/seja-parceiro.html"
      - "pages/locacao-temporada.html"
      - "pages/integracoes.html"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: translate-en
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install beautifulsoup4
      - name: Traduzir paginas de marketing para en/
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          # Para conta DeepL Pro, descomente:
          # DEEPL_API_URL: https://api.deepl.com/v2/translate
        run: python scripts/translate_en.py
      - name: Commit das paginas EN se houve mudanca
        run: |
          if [ -n "$(git status --porcelain en/)" ]; then
            git config user.name "credituz-i18n-bot"
            git config user.email "actions@users.noreply.github.com"
            git add en/
            git commit -m "chore(i18n): traduz automaticamente paginas EN [skip ci]"
            git push
          else
            echo "Sem mudancas em en/"
          fi
